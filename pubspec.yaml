name: ruralmap
description: GeoRura Mandlazini Demonstration Platform
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.6.0
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local Database
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.3

  # Device Information
  package_info_plus: ^8.0.2
  device_info_plus: ^11.3.0

  # Connectivity
  connectivity_plus: ^6.0.5

  # Permissions
  permission_handler: ^11.3.1

  # GPS & Maps
  geolocator: ^12.0.0
  geocoding: ^3.0.0
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Camera
  image_picker: ^1.0.1

  # Utilities
  intl: ^0.19.0
  url_launcher: ^6.2.2
  shared_preferences: ^2.2.0
   
  qr_flutter: ^4.0.0
  excel: ^4.0.6
  csv: ^6.0.0
  share_plus: ^10.0.2
  
  # State Management
  provider: ^6.1.2
  
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  local_auth: ^2.3.0
  crypto: ^3.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icons/

# App icon config
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  min_sdk_android: 21
  
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true